<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>음력/양력 변환기</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            width: 100%;
            max-width: 550px;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 1.8em;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        
        .date-inputs, .time-inputs {
            display: flex;
            gap: 10px;
        }
        
        .date-inputs input, .time-inputs input, .time-inputs select {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            text-align: center;
            transition: border-color 0.3s;
        }
        
        .date-inputs input:focus, .time-inputs input:focus, .time-inputs select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .time-inputs select {
            cursor: pointer;
            background: white;
        }
        
        .time-separator {
            display: flex;
            align-items: center;
            font-size: 20px;
            color: #666;
            padding: 0 5px;
        }
        
        .calendar-type {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .calendar-type button {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .calendar-type button.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }
        
        .calendar-type button:hover:not(.active) {
            border-color: #667eea;
        }
        
        .intercalation-group {
            display: none;
            margin-top: 15px;
        }
        
        .intercalation-group.show {
            display: block;
        }
        
        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .checkbox-wrapper input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
        
        .convert-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }
        
        .convert-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .result {
            display: none;
            margin-top: 30px;
            padding: 25px;
            background: #f8f9fa;
            border-radius: 15px;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .result.show {
            display: block;
        }
        
        .result h3 {
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        
        .result-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .result-row:last-child {
            border-bottom: none;
        }
        
        .result-label {
            color: #666;
            font-weight: 500;
        }
        
        .result-value {
            color: #333;
            font-weight: 600;
            text-align: right;
        }
        
        .gapja-section {
            margin-top: 20px;
            padding: 15px;
            background: linear-gradient(135deg, #667eea20 0%, #764ba220 100%);
            border-radius: 10px;
        }
        
        .gapja-section h4 {
            color: #667eea;
            margin-bottom: 15px;
        }
        
        .gapja-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
        }
        
        .gapja-label {
            color: #666;
            font-size: 0.9em;
        }
        
        .gapja-value {
            text-align: right;
        }
        
        .gapja-korean {
            font-size: 1.2em;
            color: #333;
        }
        
        .gapja-chinese {
            font-size: 1.3em;
            color: #764ba2;
            margin-left: 10px;
        }
        
        .time-gapja-section {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed #ccc;
        }
        
        .time-info {
            font-size: 0.85em;
            color: #888;
            margin-top: 3px;
        }
        
        .error {
            color: #e74c3c;
            text-align: center;
            padding: 15px;
            background: #fdf0f0;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }
        
        .error.show {
            display: block;
        }
        
        .input-with-label {
            position: relative;
        }
        
        .input-with-label span {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            pointer-events: none;
        }
        
        .input-with-label input {
            padding-right: 35px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>음력/양력 변환기</h1>
        
        <div class="form-group">
            <label>날짜 입력 <span style="font-size: 0.8em; color: #888; font-weight: normal;">(1880년~2050년)</span></label>
            <div class="date-inputs">
                <div class="input-with-label">
                    <input type="number" id="year" placeholder="년" min="1880" max="2050" value="2024">
                    <span>년</span>
                </div>
                <div class="input-with-label">
                    <input type="number" id="month" placeholder="월" min="1" max="12" value="1">
                    <span>월</span>
                </div>
                <div class="input-with-label">
                    <input type="number" id="day" placeholder="일" min="1" max="31" value="1">
                    <span>일</span>
                </div>
            </div>
        </div>
        
        <div class="form-group">
            <label>시간 입력 (24시간제)</label>
            <div class="time-inputs">
                <select id="hour">
                    <option value="" disabled>시</option>
                </select>
                <span class="time-separator">:</span>
                <select id="minute">
                    <option value="" disabled>분</option>
                </select>
            </div>
        </div>
        
        <div class="form-group">
            <label>입력 날짜 유형</label>
            <div class="calendar-type">
                <button id="solarBtn" class="active" onclick="setCalendarType('solar')">양력</button>
                <button id="lunarBtn" onclick="setCalendarType('lunar')">음력</button>
            </div>
            <div class="intercalation-group" id="intercalationGroup">
                <div class="checkbox-wrapper">
                    <input type="checkbox" id="intercalation">
                    <label for="intercalation" style="margin: 0;">윤달 (閏月)</label>
                </div>
            </div>
        </div>
        
        <button class="convert-btn" onclick="convert()">변환하기</button>
        
        <div class="error" id="error"></div>
        
        <div class="result" id="result">
            <h3>변환 결과</h3>
            <div class="result-row">
                <span class="result-label">입력</span>
                <span class="result-value" id="inputDate"></span>
            </div>
            <div class="result-row">
                <span class="result-label">양력</span>
                <span class="result-value" id="solarDate"></span>
            </div>
            <div class="result-row">
                <span class="result-label">음력</span>
                <span class="result-value" id="lunarDate"></span>
            </div>
            <div class="gapja-section">
                <h4>간지력 (干支曆)</h4>
                <div class="gapja-row">
                    <span class="gapja-label">년월일</span>
                    <div class="gapja-value">
                        <span class="gapja-korean" id="koreanGapja"></span>
                        <span class="gapja-chinese" id="chineseGapja"></span>
                    </div>
                </div>
                <div class="time-gapja-section">
                    <div class="gapja-row">
                        <span class="gapja-label">시간</span>
                        <div class="gapja-value">
                            <span class="gapja-korean" id="timeGapjaKr"></span>
                            <span class="gapja-chinese" id="timeGapjaCn"></span>
                        </div>
                    </div>
                    <div class="time-info" id="timeInfo"></div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let calendarType = 'solar';
        
        function initTimeSelects() {
            const hourSelect = document.getElementById('hour');
            const minuteSelect = document.getElementById('minute');
            
            for (let i = 0; i < 24; i++) {
                const option = document.createElement('option');
                option.value = i;
                option.textContent = i.toString().padStart(2, '0') + '시';
                if (i === 12) option.selected = true;
                hourSelect.appendChild(option);
            }
            
            for (let i = 0; i < 60; i += 10) {
                const option = document.createElement('option');
                option.value = i;
                option.textContent = i.toString().padStart(2, '0') + '분';
                if (i === 0) option.selected = true;
                minuteSelect.appendChild(option);
            }
        }
        
        function setCalendarType(type) {
            calendarType = type;
            document.getElementById('solarBtn').classList.toggle('active', type === 'solar');
            document.getElementById('lunarBtn').classList.toggle('active', type === 'lunar');
            document.getElementById('intercalationGroup').classList.toggle('show', type === 'lunar');
        }
        
        function getMinuteValue() {
            return parseInt(document.getElementById('minute').value) || 0;
        }
        
        async function convert() {
            const year = document.getElementById('year').value;
            const month = document.getElementById('month').value;
            const day = document.getElementById('day').value;
            const hour = document.getElementById('hour').value;
            const minute = getMinuteValue();
            const isIntercalation = document.getElementById('intercalation').checked;
            
            if (!year || !month || !day) {
                showError('날짜를 모두 입력해주세요.');
                return;
            }
            
            try {
                const response = await fetch('/convert', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        year: year,
                        month: month,
                        day: day,
                        hour: parseInt(hour),
                        minute: minute,
                        calendar_type: calendarType,
                        is_intercalation: isIntercalation
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('error').classList.remove('show');
                    document.getElementById('result').classList.add('show');
                    
                    document.getElementById('inputDate').textContent = 
                        data.input_type + ' ' + data.input_date + ' ' + data.input_time;
                    document.getElementById('solarDate').textContent = data.solar_date;
                    
                    let lunarText = data.lunar_date;
                    if (data.is_intercalation) {
                        lunarText = lunarText.replace(' Intercalation', ' (윤달)');
                    }
                    document.getElementById('lunarDate').textContent = lunarText;
                    
                    document.getElementById('koreanGapja').textContent = data.korean_gapja;
                    document.getElementById('chineseGapja').textContent = data.chinese_gapja;
                    
                    document.getElementById('timeGapjaKr').textContent = data.time_gapja_kr;
                    document.getElementById('timeGapjaCn').textContent = data.time_gapja_cn;
                    document.getElementById('timeInfo').textContent = 
                        data.time_name_kr + ' (' + data.time_name_cn + ') - ' + data.time_range;
                } else {
                    showError('변환 오류: ' + data.error);
                }
            } catch (error) {
                showError('서버 연결 오류가 발생했습니다.');
            }
        }
        
        function showError(message) {
            document.getElementById('result').classList.remove('show');
            const errorEl = document.getElementById('error');
            errorEl.textContent = message;
            errorEl.classList.add('show');
        }
        
        initTimeSelects();
    </script>
</body>
</html>
